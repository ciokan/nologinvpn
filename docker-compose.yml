services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       nologinvpn
      POSTGRES_USER:     nologinvpn
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nologinvpn_dev}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nologinvpn"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
